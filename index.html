<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Word Formation Trainer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f7fa; color: #1a1a2e; min-height: 100vh; }
    header { background: #1e3a5f; color: #fff; padding: 1.2rem 2rem; display: flex; align-items: center; gap: 2rem; flex-wrap: wrap; }
    header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: 0.02em; }
    header p { font-size: 0.9rem; opacity: 0.8; }
    .controls { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; margin-left: auto; }
    #score { font-weight: 700; font-size: 1rem; background: #ffffff22; padding: 0.3rem 0.8rem; border-radius: 20px; display: none; }
    button { cursor: pointer; border: none; border-radius: 6px; font-size: 0.9rem; font-weight: 600; padding: 0.5rem 1.2rem; transition: background 0.15s; }
    #btn-check { background: #f0a500; color: #1a1a2e; }
    #btn-check:hover { background: #d49000; }
    #btn-new { background: transparent; color: #fff; border: 2px solid #fff; }
    #btn-new:hover { background: #ffffff22; }
    .table-wrap { overflow-x: auto; padding: 1.5rem 1rem 3rem; }
    table { border-collapse: collapse; width: 100%; min-width: 560px; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 12px #0001; }
    thead tr { background: #1e3a5f; color: #fff; }
    thead th { padding: 0.75rem 0.9rem; text-align: left; font-size: 0.85rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }

    tbody tr:nth-child(even) { background: #f8f9fb; }
    tbody tr:hover { background: #eef2ff; }
    td { padding: 0.45rem 0.6rem; vertical-align: middle; }
    td.given-cell { background: #dbeafe; font-weight: 700; font-size: 0.95rem; color: #1e3a5f; min-width: 110px; }
    td.input-cell { min-width: 140px; }
    input.word-input {
      width: 100%; border: 1.5px solid #d1d5db; border-radius: 5px;
      padding: 0.35rem 0.5rem; font-size: 0.88rem; outline: none;
      background: #fff; transition: border-color 0.15s;
    }
    input.word-input:focus { border-color: #3b82f6; }
    input.word-input.correct { border-color: #22c55e; background: #f0fdf4; }
    input.word-input.incorrect { border-color: #ef4444; background: #fef2f2; }
    .hint-text { font-size: 0.75rem; color: #ef4444; margin-top: 2px; display: block; }
    td.empty-cell { color: #9ca3af; font-size: 0.8rem; font-style: italic; text-align: center; }
  </style>
</head>
<body>
<header>
  <div>
    <h1>Word Formation Trainer</h1>
    <p>Fill in the missing Noun, Adjective and Adverb forms.</p>
  </div>
  <div class="controls">
    <span id="score"></span>
    <button id="btn-check">Check Answers</button>
    <button id="btn-new">New Test</button>
  </div>
</header>
<div class="table-wrap">

</div>

// ─── State ────────────────────────────────────────────────────────────────────
const CATS = ["noun","adj","adverb"];
let state = []; // [{ given: "noun"|"adj"|"adverb", givenWord: "..." }, ...]

function pickGiven(family) {
  const available = CATS.filter(c => family[c].length > 0);
  if (available.length === 0) return { given: "noun", givenWord: "—" };
  const cat = available[Math.floor(Math.random() * available.length)];
  const words = family[cat];
  const word = words[Math.floor(Math.random() * words.length)];
  return { given: cat, givenWord: word };
}

function buildState() {
  // Build a shuffled index order (Fisher-Yates)
  const indices = wordFamilies.map((_, i) => i);
  for (let i = indices.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [indices[i], indices[j]] = [indices[j], indices[i]];
  }
  state = indices.map(i => ({ index: i, ...pickGiven(wordFamilies[i]) }));
}

// ─── Table Rendering ──────────────────────────────────────────────────────────
function renderTable() {
  const tbody = document.getElementById("quiz-body");
  tbody.innerHTML = "";
  state.forEach(({ index: i, given, givenWord }) => {
    const fam = wordFamilies[i];
    const tr = document.createElement("tr");
    tr.dataset.index = i;

    // Noun, Adj, Adverb cells
    CATS.forEach(cat => {
      const td = document.createElement("td");
      td.className = "input-cell";
      if (cat === given) {
        // Pre-filled — show same word, read-only style
        td.textContent = givenWord;
        td.style.fontWeight = "600";
        td.style.color = "#1e3a5f";
      } else {
        const input = document.createElement("input");
        input.type = "text";
        input.className = "word-input";
        input.dataset.cat = cat;
        input.autocomplete = "off";
        input.spellcheck = false;
        // If there's nothing to fill, mark placeholder as empty
        if (fam[cat].length === 0) {
          input.placeholder = "(none)";
        }
        td.appendChild(input);
      }
      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });
  const scoreEl = document.getElementById("score");
  scoreEl.textContent = "";
  scoreEl.style.display = "none";
}

// ─── Check Answers ────────────────────────────────────────────────────────────
function checkAnswers() {
  let correct = 0, total = 0;
  const rows = document.querySelectorAll("#quiz-body tr");
  rows.forEach((tr, rowIdx) => {
    const { index: i, given } = state[rowIdx];
    const fam = wordFamilies[i];

    tr.querySelectorAll("input.word-input").forEach(input => {
      const cat = input.dataset.cat;
      const expected = fam[cat]; // array of correct answers
      const val = input.value.trim().toLowerCase();

      // Remove old hints
      const old = input.parentNode.querySelector(".hint-text");
      if (old) old.remove();
      input.classList.remove("correct","incorrect");

      if (expected.length === 0) {
        // No word to fill in — leave unstyled
      } else {
        // Real word expected — only count if the student filled something in
        if (val !== "") {
          total++;
          const match = expected.some(w => w.toLowerCase() === val);
          if (match) {
            input.classList.add("correct");
            correct++;
          } else {
            input.classList.add("incorrect");
            const hint = document.createElement("span");
            hint.className = "hint-text";
            hint.textContent = "✓ " + expected.join(" / ");
            input.parentNode.appendChild(hint);
          }
        }
      }
    });
  });
  const scoreEl = document.getElementById("score");
  scoreEl.textContent = correct + " / " + total + " correct";
  scoreEl.style.display = "inline";
}

// ─── Init ─────────────────────────────────────────────────────────────────────
function newTest() {
  buildState();
  renderTable();
}

document.getElementById("btn-check").addEventListener("click", checkAnswers);
document.getElementById("btn-new").addEventListener("click", newTest);

newTest();
